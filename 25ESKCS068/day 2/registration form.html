<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Feedback Form</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      background: #f3e8ff;
      color: #202124;
      display: flex;
      justify-content: center;
      padding: 30px 15px;
    }

    .form-card {
      width: 100%;
      max-width: 700px;
      background: white;
      border-radius: 10px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      overflow: hidden;
    }

    .header {
      background: #673ab7;
      color: white;
      padding: 28px 24px;
    }

    .header h1 {
      margin: 0 0 8px;
      font-size: 24px;
    }

    .header p {
      margin: 0;
      font-size: 14px;
      opacity: 0.95;
    }

    form {
      padding: 24px;
    }

    .field {
      margin-bottom: 18px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      font-size: 14px;
    }

    input[type="text"],
    input[type="email"],
    input[type="number"],
    select,
    textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #dadce0;
      border-radius: 6px;
      font-size: 14px;
      outline: none;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: #673ab7;
      box-shadow: 0 0 0 2px rgba(103, 58, 183, 0.15);
    }

    textarea {
      min-height: 100px;
      resize: vertical;
    }

    button {
      background: #673ab7;
      color: white;
      padding: 12px 20px;
      border: none;
      border-radius: 6px;
      font-size: 15px;
      cursor: pointer;
    }

    button:hover {
      background: #5e34a8;
    }
  </style>
</head>
<body>
  <div class="form-card">
    <div class="header">
      <h1>Student Registration Form</h1>
      <p>Please fill in your details below.</p>
    </div>

    <form>
      <div class="field">
        <label for="name">Full Name</label>
        <input type="text" id="name" placeholder="Enter your full name" />
      </div>

      <div class="field">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="Enter your email" />
      </div>

      <div class="field">
        <label for="student-id">Student ID</label>
        <input type="number" id="student-id" placeholder="Enter your student ID" />
      </div>

      <div class="field">
        <label for="year">Academic Year</label>
        <select id="year">
          <option>First Year</option>
          <option>Second Year</option>
          <option>Third Year</option>
          <option>Fourth Year</option>
        </select>
      </div>

      <div class="field">
        <label for="message">Additional Notes</label>
        <textarea id="message" placeholder="Write any extra information here"></textarea>
      </div>

      <button type="submit">Submit</button>
    </form>
  </div>
</body>
</html>
