<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Build Sprint Project</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">


<style>

body{
    background:#f5f5f5;
    transition:0.3s;
}


.dark{
    background:#111;
    color:rgb(0, 0, 0);
}


.dark .card{
    background:#222;
    color:rgb(238, 220, 220);
}


.hero{
    min-height:300px;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}


.card{
    border-radius:15px;
}


</style>

</head>


<body>



<!-- Navbar -->

<nav class="navbar navbar-dark bg-primary">

<div class="container">

<h3 class="text-white">
My Landing Page
</h3>


<button class="btn btn-light"
onclick="darkMode()">
Dark Mode
</button>


</div>

</nav>





<div class="container mt-5">



<!-- Hero Section -->

<div class="hero bg-white rounded shadow p-4">


<h1>
Welcome 👋
</h1>


<p>
This is my 30 minute build sprint project
</p>


<button class="btn btn-primary">
Explore
</button>


</div>



<br>



<div class="row">



<!-- Counter -->

<div class="col-md-6">


<div class="card shadow p-4 text-center">


<h3>
Click Counter
</h3>


<h1 id="count">
0
</h1>



<button class="btn btn-success"
onclick="increase()">

Click Me

</button>


<button class="btn btn-danger mt-2"
onclick="resetCount()">

Reset

</button>


</div>


</div>





<!-- Form -->

<div class="col-md-6">


<div class="card shadow p-4">


<h3>
Contact Form
</h3>


<form onsubmit="validate(event)">



<input 
class="form-control mb-3"
id="name"
placeholder="Enter Name">



<input
class="form-control mb-3"
id="email"
placeholder="Enter Email">



<button class="btn btn-primary">

Submit

</button>



<p id="message"
class="mt-3">

</p>


</form>



</div>


</div>



</div>


</div>






<script>


// Dark mode

function darkMode(){

document.body.classList.toggle("dark");

}



// Counter

let count=0;


function increase(){

count++;

document.getElementById("count").innerHTML=count;

}


function resetCount(){

count=0;

document.getElementById("count").innerHTML=count;

}




// Form Validation


function validate(e){

e.preventDefault();


let name=document.getElementById("name").value;

let email=document.getElementById("email").value;


let msg=document.getElementById("message");



if(name=="" || email==""){

msg.innerHTML="Please fill all fields ❌";

msg.style.color="red";

}


else if(!email.includes("@")){


msg.innerHTML="Invalid Email ❌";

msg.style.color="red";


}

else{


msg.innerHTML="Form Submitted Successfully ✅";

msg.style.color="green";


}



}



</script>


</body>

</html>
